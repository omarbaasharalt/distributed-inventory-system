services:
  auth-service:
    build: ./auth-service
    ports:
      - "8081:8081"
    environment:
      - SERVER_PORT=8081

  notif-service:
    build: ./notif-service
    ports:
      - "8082:8082"
    environment:
      - SERVER_PORT=8082

  inventory-service:
    build: ./inventory-service
    ports:
      - "8083:8083"
    environment:
      - SERVER_PORT=8083
      - NOTIFICATION_SERVICE_URL=http://notif-service:8082/notifications/low-stock

  api-gateway:
    build: ./api-gateway
    ports:
      - "8080:8080"
    depends_on:
      - auth-service
      - inventory-service
      - notif-service
    environment:
      - AUTH_SERVICE_URL=http://auth-service:8081
      - INVENTORY_SERVICE_URL=http://inventory-service:8083
      - NOTIF_SERVICE_URL=http://notif-service:8082